<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자산 포트폴리오 비교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg2:#f5f5f3; --bg3:#eeede9;
  --t:#1a1a1a; --t2:#555; --t3:#999;
  --br:rgba(0,0,0,0.12); --br2:rgba(0,0,0,0.22);
  --blu:#185FA5; --grn:#1D9E75; --red:#A32D2D;
  --r:10px; --rs:7px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1e; --bg2:#2a2a2a; --bg3:#333;
    --t:#f0f0f0; --t2:#aaa; --t3:#666;
    --br:rgba(255,255,255,0.1); --br2:rgba(255,255,255,0.22);
    --blu:#5da3e8; --grn:#4fc49a; --red:#e07070;
  }
}
body { background:var(--bg3); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:16px; min-height:100vh; }
h1 { font-size:17px; font-weight:500; color:var(--t); margin-bottom:14px; }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:600px){ .g2{ grid-template-columns:1fr; } }
.card { background:var(--bg); border:.5px solid var(--br); border-radius:var(--r); padding:14px; }
.pbar { display:flex; align-items:center; gap:6px; margin-bottom:12px; }
.psel { flex:1; font-size:12px; padding:5px 8px; border:.5px solid var(--br2); border-radius:var(--rs); background:var(--bg2); color:var(--t); outline:none; cursor:pointer; min-width:0; }
.pico { font-size:12px; background:none; border:.5px solid var(--br); border-radius:var(--rs); cursor:pointer; padding:4px 8px; color:var(--t2); white-space:nowrap; flex-shrink:0; }
.pico:hover { background:var(--bg2); }
.pname-inp { flex:1; font-size:12px; padding:5px 8px; border:.5px solid var(--br2); border-radius:var(--rs); background:var(--bg2); color:var(--t); outline:none; }
.pbtn { font-size:12px; padding:4px 10px; border:.5px solid var(--br2); border-radius:var(--rs); background:none; color:var(--t2); cursor:pointer; white-space:nowrap; flex-shrink:0; }
.pbtn:hover { background:var(--bg2); }
.pbtn.ok { background:var(--bg3); color:var(--t); font-weight:500; }
.chart-box { position:relative; height:170px; margin-bottom:8px; }
.leg { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; min-height:18px; }
.li { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--t2); }
.ld { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.cat { margin-bottom:7px; border:.5px solid var(--br); border-radius:var(--rs); overflow:hidden; }
.ch { display:flex; align-items:center; gap:6px; padding:7px 10px; background:var(--bg2); cursor:pointer; user-select:none; }
.ccol { width:18px; height:18px; border-radius:3px; border:.5px solid var(--br2); flex-shrink:0; cursor:pointer; }
.ccol:hover { opacity:.8; }
.cname { flex:1; font-size:13px; font-weight:500; background:transparent; border:none; outline:none; color:var(--t); min-width:0; cursor:text; }
.ctot { font-size:11px; color:var(--t3); white-space:nowrap; }
.ctog { font-size:10px; color:var(--t3); flex-shrink:0; }
.cdel { font-size:12px; color:var(--t3); background:none; border:none; cursor:pointer; padding:0 2px; }
.cep { display:flex; align-items:center; gap:8px; padding:8px 10px; border-top:.5px solid var(--br); background:var(--bg2); flex-wrap:wrap; }
.cep-lbl { font-size:11px; color:var(--t2); }
.csw { width:22px; height:22px; border-radius:3px; border:.5px solid var(--br2); display:inline-block; flex-shrink:0; }
input[type=color].cpick { width:50px; height:28px; padding:2px; border:.5px solid var(--br2); border-radius:var(--rs); cursor:pointer; background:var(--bg); }
.cb { padding:8px 10px; border-top:.5px solid var(--br); }
.ir { display:flex; align-items:center; gap:5px; margin-bottom:5px; }
.iname { flex:1; font-size:12px; padding:4px 7px; border:.5px solid var(--br2); border-radius:var(--rs); background:var(--bg2); color:var(--t); outline:none; min-width:0; }
.ival { width:75px; font-size:12px; padding:4px 7px; border:.5px solid var(--br2); border-radius:var(--rs); background:var(--bg2); color:var(--t); outline:none; text-align:right; }
.iunit { font-size:11px; color:var(--t3); flex-shrink:0; }
.idel { font-size:12px; color:var(--t3); background:none; border:none; cursor:pointer; padding:0; }
.addi { font-size:11px; color:var(--blu); background:none; border:none; cursor:pointer; padding:2px 0; margin-top:1px; display:block; }
.addc { width:100%; font-size:12px; padding:6px; border:.5px dashed var(--br2); border-radius:var(--rs); background:none; color:var(--t2); cursor:pointer; margin-top:4px; }
.addc:hover { background:var(--bg2); }
.dw { margin-top:14px; background:var(--bg2); border-radius:var(--r); padding:14px; }
.dt { font-size:13px; font-weight:500; color:var(--t2); margin-bottom:8px; }
.dg { display:flex; flex-wrap:wrap; gap:7px; }
.dc { padding:6px 12px; border-radius:var(--rs); border:.5px solid var(--br); background:var(--bg); }
.dlb { font-size:10px; color:var(--t3); display:flex; align-items:center; gap:4px; }
.dv { font-size:14px; font-weight:500; margin-top:2px; }
.note { font-size:11px; color:var(--t3); text-align:right; margin-top:10px; }
</style>
</head>
<body>
<h1>자산 포트폴리오 비교</h1>
<div class="g2">
  <div class="card">
    <div id="pbar-target"></div>
    <div class="chart-box"><canvas id="ct" role="img" aria-label="목표 포트폴리오 도넛 차트">목표 포트폴리오 비율</canvas></div>
    <div class="leg" id="lt"></div>
    <div id="cats-target"></div>
    <button class="addc" onclick="addCat('target')">+ 항목 추가</button>
  </div>
  <div class="card">
    <div id="pbar-current"></div>
    <div class="chart-box"><canvas id="cc" role="img" aria-label="현재 포트폴리오 도넛 차트">현재 포트폴리오 비율</canvas></div>
    <div class="leg" id="lc"></div>
    <div id="cats-current"></div>
    <button class="addc" onclick="addCat('current')">+ 항목 추가</button>
  </div>
</div>
<div class="dw">
  <p class="dt">목표 대비 현재 차이</p>
  <div class="dg" id="dg"></div>
</div>
<p class="note">입력값은 이 기기에 자동 저장됩니다</p>

<script>
const uid = () => Math.random().toString(36).slice(2, 8);
const PRESETS = ['#3266ad','#1D9E75','#D85A30','#BA7517','#7F77DD','#D4537E','#639922','#E24B4A'];
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const csum = c => c.items.reduce((s,i) => s + (parseFloat(i.val)||0), 0);
const prof = side => S[side].profiles.find(p => p.id === S[side].activeId);

const charts = {};
const UI = { colorEditing:{}, renaming:{} };
let S;

function mkProf(label, n) {
  return {
    id:uid(), name:`${label} ${n}`,
    cats:[
      {id:uid(),name:'현금',color:'#3266ad',open:true,items:[{id:uid(),name:'원화',val:''}]},
      {id:uid(),name:'주식',color:'#1D9E75',open:true,items:[{id:uid(),name:'',val:''}]},
    ]
  };
}
function defState() {
  const tp=mkProf('목표 포트폴리오',1), cp=mkProf('현재 포트폴리오',1);
  return { target:{activeId:tp.id,profiles:[tp]}, current:{activeId:cp.id,profiles:[cp]} };
}

let canSave=false;
try { localStorage.setItem('__c','1'); localStorage.removeItem('__c'); canSave=true; } catch(e) {}
function loadState() {
  if (!canSave) return defState();
  try { const d=localStorage.getItem('pf-v3'); return d?JSON.parse(d):defState(); }
  catch(e) { return defState(); }
}
function save() { if(!canSave)return; try{localStorage.setItem('pf-v3',JSON.stringify(S));}catch(e){} }

function renderProfileBar(side) {
  const el=document.getElementById('pbar-'+side); if(!el)return;
  const s=S[side], p=prof(side);
  if (UI.renaming[side]) {
    el.innerHTML=`<div class="pbar"><input class="pname-inp" id="rinp-${side}" value="${esc(p.name)}" data-fid="rinp-${side}" onkeydown="if(event.key==='Enter')confirmRename('${side}');if(event.key==='Escape')cancelRename('${side}')"><button class="pbtn ok" onclick="confirmRename('${side}')">확인</button><button class="pbtn" onclick="cancelRename('${side}')">취소</button></div>`;
    setTimeout(()=>{const i=document.getElementById('rinp-'+side);if(i){i.focus();i.select();}},0);
  } else {
    el.innerHTML=`<div class="pbar"><select class="psel" onchange="switchProf('${side}',this.value)">${s.profiles.map(p2=>`<option value="${p2.id}"${p2.id===s.activeId?' selected':''}>${esc(p2.name)}</option>`).join('')}</select><button class="pico" onclick="startRename('${side}')" title="이름 변경">✏</button><button class="pico" onclick="addProf('${side}')" title="새 포트폴리오 추가">+</button>${s.profiles.length>1?`<button class="pico" style="color:var(--red)" onclick="delProf('${side}')" title="삭제">✕</button>`:''}</div>`;
  }
}

function renderCats(side) {
  const fa=document.activeElement, fid=fa?.dataset?.fid, fpos=fa?.selectionStart??null;
  const cats=prof(side).cats;
  document.getElementById('cats-'+side).innerHTML=cats.map((cat,ci)=>{
    const tot=csum(cat), key=side+'-'+ci, pending=UI.colorEditing[key], editing=pending!==undefined;
    return `<div class="cat"><div class="ch" onclick="${editing?'':('tog(\''+side+'\','+ci+')')}"><div class="ccol" style="background:${cat.color}" onclick="event.stopPropagation();${editing?'cancelColor(\''+side+'\','+ci+')':'startColorEdit(\''+side+'\','+ci+')'}" title="${editing?'취소':'색상 변경'}"></div><input class="cname" value="${esc(cat.name)}" placeholder="항목명" data-fid="cn-${cat.id}" onclick="event.stopPropagation()" oninput="event.stopPropagation();setCN('${side}',${ci},this.value)"><span class="ctot" id="tot-${side}-${ci}">${tot>0?tot.toLocaleString()+'만원':''}</span><span class="ctog">${cat.open&&!editing?'▲':'▼'}</span><button class="cdel" onclick="event.stopPropagation();delCat('${side}',${ci})" title="삭제">✕</button></div>${editing?`<div class="cep"><span class="cep-lbl">색상 선택</span><span class="csw" id="csw-${side}-${ci}" style="background:${pending}"></span><input type="color" class="cpick" value="${pending}" oninput="setPendingColor('${side}',${ci},this.value)"><button class="pbtn ok" onclick="confirmColor('${side}',${ci})">확인</button><button class="pbtn" onclick="cancelColor('${side}',${ci})">취소</button></div>`:''}${cat.open&&!editing?`<div class="cb">${cat.items.map((it,ii)=>`<div class="ir"><input class="iname" placeholder="세부 항목명" value="${esc(it.name)}" data-fid="in-${it.id}" oninput="setIN('${side}',${ci},${ii},this.value)"><input class="ival" type="number" placeholder="0" value="${it.val}" min="0" data-fid="iv-${it.id}" oninput="setIV('${side}',${ci},${ii},this.value)"><span class="iunit">만원</span><button class="idel" onclick="delItem('${side}',${ci},${ii})" title="삭제">✕</button></div>`).join('')}<button class="addi" onclick="addItem('${side}',${ci})">+ 세부 항목 추가</button></div>`:''}</div>`;
  }).join('');
  if(fid){const e=document.querySelector(`[data-fid="${fid}"]`);if(e){e.focus();if(fpos!==null&&e.setSelectionRange)try{e.setSelectionRange(fpos,fpos)}catch(ex){}}}
}

function updLegend(side) {
  const cats=prof(side).cats, tot=cats.reduce((s,c)=>s+csum(c),0);
  document.getElementById('l'+side[0]).innerHTML=tot===0?'<span style="font-size:11px;color:var(--t3)">값을 입력하면 차트가 표시됩니다</span>':cats.map(c=>`<span class="li"><span class="ld" style="background:${c.color}"></span>${c.name} ${Math.round(csum(c)/tot*100)}%</span>`).join('');
}
function updChart(side) {
  const cats=prof(side).cats, tot=cats.reduce((s,c)=>s+csum(c),0), ch=charts[side];
  if(!ch)return;
  const empty=tot===0;
  ch.data.datasets[0].data=cats.map(c=>empty?1:csum(c));
  ch.data.datasets[0].backgroundColor=cats.map(c=>empty?'#d0d0d0':c.color);
  ch.data.labels=cats.map(c=>c.name);
  ch.update('none');
}
function updDiff() {
  const tc=prof('target').cats, cc=prof('current').cats;
  const tt=tc.reduce((s,c)=>s+csum(c),0), ct=cc.reduce((s,c)=>s+csum(c),0);
  const el=document.getElementById('dg');
  if(tt===0||ct===0){el.innerHTML='<span style="font-size:12px;color:var(--t3)">목표와 현재를 모두 입력하면 비교됩니다</span>';return;}
  const names=[...new Set([...tc.map(c=>c.name),...cc.map(c=>c.name)])];
  el.innerHTML=names.map(n=>{
    const t=tc.find(c=>c.name===n), cu=cc.find(c=>c.name===n);
    const d=Math.round(((cu?csum(cu)/ct*100:0)-(t?csum(t)/tt*100:0))*10)/10;
    const col=Math.abs(d)<1?'var(--grn)':Math.abs(d)<5?'#BA7517':'var(--red)';
    return`<div class="dc"><div class="dlb"><span style="width:7px;height:7px;border-radius:2px;background:${(t||cu).color};display:inline-block"></span>${n}</div><div class="dv" style="color:${col}">${d>0?'+':''}${d.toFixed(1)}%p</div></div>`;
  }).join('');
}

function refresh(side){renderProfileBar(side);renderCats(side);updLegend(side);updChart(side);updDiff();save();}
function updV(side){updLegend(side);updChart(side);updDiff();save();}

function startColorEdit(s,ci){Object.keys(UI.colorEditing).forEach(k=>delete UI.colorEditing[k]);UI.colorEditing[s+'-'+ci]=prof(s).cats[ci].color;renderCats(s);}
function setPendingColor(s,ci,v){UI.colorEditing[s+'-'+ci]=v;const sw=document.getElementById('csw-'+s+'-'+ci);if(sw)sw.style.background=v;}
function confirmColor(s,ci){prof(s).cats[ci].color=UI.colorEditing[s+'-'+ci];delete UI.colorEditing[s+'-'+ci];refresh(s);}
function cancelColor(s,ci){delete UI.colorEditing[s+'-'+ci];renderCats(s);}

function addProf(s){const lbl=s==='target'?'목표 포트폴리오':'현재 포트폴리오';const p=mkProf(lbl,S[s].profiles.length+1);S[s].profiles.push(p);S[s].activeId=p.id;refresh(s);}
function switchProf(s,id){S[s].activeId=id;refresh(s);}
function delProf(s){if(S[s].profiles.length<=1)return;const idx=S[s].profiles.findIndex(p=>p.id===S[s].activeId);S[s].profiles.splice(idx,1);S[s].activeId=S[s].profiles[Math.max(0,idx-1)].id;refresh(s);}
function startRename(s){UI.renaming[s]=true;renderProfileBar(s);}
function confirmRename(s){const inp=document.getElementById('rinp-'+s);if(inp&&inp.value.trim())prof(s).name=inp.value.trim();UI.renaming[s]=false;renderProfileBar(s);save();}
function cancelRename(s){UI.renaming[s]=false;renderProfileBar(s);}

function tog(s,ci){prof(s).cats[ci].open=!prof(s).cats[ci].open;refresh(s);}
function setCN(s,ci,v){prof(s).cats[ci].name=v;updV(s);}
function delCat(s,ci){prof(s).cats.splice(ci,1);refresh(s);}
function addCat(s){const used=prof(s).cats.map(c=>c.color);const col=PRESETS.find(c=>!used.includes(c))||PRESETS[prof(s).cats.length%PRESETS.length];prof(s).cats.push({id:uid(),name:'새 항목',color:col,open:true,items:[{id:uid(),name:'',val:''}]});refresh(s);}
function addItem(s,ci){prof(s).cats[ci].items.push({id:uid(),name:'',val:''});refresh(s);}
function delItem(s,ci,ii){prof(s).cats[ci].items.splice(ii,1);refresh(s);}
function setIN(s,ci,ii,v){prof(s).cats[ci].items[ii].name=v;save();}
function setIV(s,ci,ii,v){prof(s).cats[ci].items[ii].val=v;const tot=csum(prof(s).cats[ci]);const sp=document.getElementById('tot-'+s+'-'+ci);if(sp)sp.textContent=tot>0?tot.toLocaleString()+'만원':'';updV(s);}

S=loadState();
['target','current'].forEach((side,i)=>{
  charts[side]=new Chart(document.getElementById(i===0?'ct':'cc'),{
    type:'doughnut',
    data:{labels:[],datasets:[{data:[],backgroundColor:[],borderWidth:2,borderColor:'transparent'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{
        const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);
        const p=tot>0?Math.round(ctx.parsed/tot*100):0;
        return` ${ctx.label}: ${ctx.parsed>0?ctx.parsed.toLocaleString()+'만원':'—'} (${p}%)`;
      }}}}}
  });
  refresh(side);
});
</script>
</body>
</html>
